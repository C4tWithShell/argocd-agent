{{- if .Values.tlsSecret.create -}}
{{- $crt := required "tlsSecret.create=true requires tlsSecret.crt to be set (PEM-encoded certificate)" .Values.tlsSecret.crt -}}
{{- $key := required "tlsSecret.create=true requires tlsSecret.key to be set (PEM-encoded private key)" .Values.tlsSecret.key -}}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ include "argocd-agent-principal.tlsSecretName" . }}
  namespace: {{ include "argocd-agent-principal.namespace" . }}
  labels:
    {{- include "argocd-agent-principal.labels" . | nindent 4 }}
data:
  tls.crt: {{ $crt | b64enc | quote }}
  tls.key: {{ $key | b64enc | quote }}
{{- end }}