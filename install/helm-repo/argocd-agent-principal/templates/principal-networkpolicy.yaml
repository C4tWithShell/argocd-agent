{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "argocd-agent-principal.fullname" . }}-redis-proxy
  namespace: {{ include "argocd-agent-principal.namespace" . }}
  labels:
    {{- include "argocd-agent-principal.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "argocd-agent-principal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: principal
  policyTypes:
  - Ingress
  ingress:
  # Allow Redis proxy port (6379) only from Argo CD components
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: argocd
    ports:
    - protocol: TCP
      port: 6379
  # Allow principal gRPC port (8443) from agents (may come from external clusters)
  - ports:
    - protocol: TCP
      port: 8443
  # Allow metrics and healthz from monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8003
{{- end }}
