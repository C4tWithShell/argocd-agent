# Default values for argocd-agent-principal
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## @section Global
# -- Override namespace to deploy the agent into. Leave empty to use the release namespace.
namespaceOverride: ""
# -- Override the chart name
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

## @section Image
image:
  # -- Image repository
  repository: ghcr.io/argoproj-labs/argocd-agent/argocd-agent
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag
  tag: ""

## @section Deployment
# -- Number of replicas for the principal deployment
replicaCount: 1
# -- Image pull secrets
imagePullSecrets: []
# -- Annotations for the Deployment
deploymentAnnotations: {}
# -- Automount API credentials for the Service Account into the pod.
automountServiceAccountToken: true
# -- Resource requests and limits for the principal container
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
# -- Deployment update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%
# -- Number of old ReplicaSets to retain
revisionHistoryLimit: 10
# -- Deployment progress deadline in seconds
progressDeadlineSeconds: 600

## @section ServiceAccount
# -- ServiceAccount configuration.
serviceAccount:
  # -- Whether to create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Name of the ServiceAccount (defaults to chart fullname)
  name: ""

## @section Pod security context
podSecurityContext:
  fsGroup: 999
  fsGroupChangePolicy: "OnRootMismatch"
  runAsGroup: 999
  runAsNonRoot: true
  runAsUser: 999
  seccompProfile:
    type: RuntimeDefault

## @section Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 999
  runAsNonRoot: true
  runAsUser: 999
  seccompProfile:
    type: RuntimeDefault

## @section Pod Scheduling and Metadata
# -- Node selector for scheduling the agent Pod.
nodeSelector: {}
# -- Tolerations for pod scheduling
tolerations: []
# -- Affinity rules for pod scheduling
affinity: {}
# -- Topology spread constraints for pod scheduling
topologySpreadConstraints: []
# -- Annotations for the Pod
podAnnotations: {}
# -- Additional labels to add to the agent Pod.
podLabels: {}
# -- PriorityClassName for the agent Pod.
priorityClassName: ""
# -- Grace period for pod termination (seconds)
terminationGracePeriodSeconds: 30
# -- Host aliases injected into /etc/hosts
hostAliases: []
# -- DNS policy for the Pod (e.g. ClusterFirst, None)
dnsPolicy: ""
# -- DNS config for the Pod (only honored when dnsPolicy is "None")
dnsConfig: {}
## -- Extra environment variables to add to the container
extraEnv: []
## -- Extra env vars sourced from existing ConfigMaps (list of names, mounted via envFrom)
extraEnvVarsCM: []
## -- Extra env vars sourced from existing Secrets (list of names, mounted via envFrom)
extraEnvVarsSecret: []
## -- Extra volume mounts
extraVolumeMounts: []
## -- Extra volumes
extraVolumes: []

## @section Probes
# -- Liveness and readiness probe configuration.
probes:
  liveness:
    # -- Enable the liveness probe.
    enabled: true
    httpGet:
      path: /healthz
      port: healthz
    # -- Initial delay before the first liveness probe.
    initialDelaySeconds: 10
    # -- Frequency of liveness probes.
    periodSeconds: 10
    # -- Timeout for liveness probe.
    timeoutSeconds: 2
    # -- Failure threshold for liveness probe.
    failureThreshold: 3
  readiness:
    # -- Enable the readiness probe.
    enabled: true
    httpGet:
      path: /healthz
      port: healthz
    # -- Initial delay before the first readiness probe.
    initialDelaySeconds: 5
    # -- Frequency of readiness probes.
    periodSeconds: 10
    # -- Timeout for readiness probe.
    timeoutSeconds: 2
    # -- Failure threshold for readiness probe.
    failureThreshold: 3

## @section RBAC
rbac:
  # -- To create Role and RoleBinding
  create: true
  # -- Whether to create ClusterRole and ClusterRoleBinding
  createClusterRole: false

## @section Principal Parameters
params:
  # -- Interface address to listen on. Empty string binds to all interfaces,
  # which is the correct default when the gRPC service is exposed through a
  # Kubernetes Service (LoadBalancer / NodePort / Ingress) and agents connect
  # from outside the pod network. Use "127.0.0.1" only in service-mesh or
  # mTLS-sidecar deployments where another local process terminates TLS — in
  # those topologies binding to localhost prevents direct pod traffic.
  listenHost: ""
  # -- gRPC server listen port
  listenPort: "8443"
  # -- Log level: trace, debug, info, warn, error
  logLevel: "info"
  # -- Log format: text or json
  logFormat: "text"
  # -- Metrics server port
  metricsPort: "8000"
  # -- Health check server port
  healthzPort: "8003"
  # -- Namespace the principal operates in
  namespace: "argocd"
  # -- Comma-separated list of namespaces to watch (supports shell-style wildcards)
  allowedNamespaces: ""

  namespaceCreate:
    # -- Allow the principal to create namespaces for agents
    enable: "false"
    # -- Regexp to restrict names of created namespaces
    pattern: ""
    # -- Labels to apply to created namespaces (comma-separated key=value pairs)
    labels: ""

  tls:
    # -- Name of the secret containing the TLS cert and key
    secretName: "argocd-agent-principal-tls"
    # -- Path to the TLS certificate (overrides secretName if set)
    serverCertPath: ""
    # -- Path to the TLS private key (overrides secretName if set)
    serverKeyPath: ""
    # -- Allow the principal to auto-generate TLS cert/key (dev only)
    allowGenerate: "false"
    # -- Run gRPC without TLS (for service mesh / mTLS sidecar environments)
    insecurePlaintext: "false"
    # -- Require client certificates from agents
    clientCertRequire: "false"
    # -- Name of the secret containing the root CA certificate
    rootCaSecretName: "argocd-agent-ca"
    # -- Path to the root CA certificate (overrides rootCaSecretName if set)
    rootCaPath: ""
    # -- Match client cert subject to agent name
    clientCertMatchSubject: "false"
    # -- Minimum TLS version: tls1.1, tls1.2, tls1.3
    minVersion: "tls1.3"
    # -- Maximum TLS version (empty = use highest available)
    maxVersion: ""
    # -- Comma-separated list of TLS cipher suites (empty = Go defaults)
    ciphersuites: ""

  jwt:
    # -- Allow the principal to auto-generate JWT signing key (dev only)
    allowGenerate: "false"
    # -- Name of the secret containing the JWT signing key
    secretName: "argocd-agent-jwt"
    # -- Path to the JWT signing key (overrides secretName if set)
    keyPath: ""

  # -- Authentication method. Format: <method>:<config>
  # Examples:
  #   "mtls:CN=([^,]+)"
  #   "userpass:/app/config/userpass/passwd"
  #   "header:x-forwarded-client-cert:^.*URI=spiffe://[^/]+/ns/[^/]+/sa/([^,;]+)"
  auth: "mtls:CN=([^,]+)"

  resourceProxy:
    # -- Enable the resource proxy
    enable: "true"
    # -- Name of the secret containing the resource proxy TLS cert/key
    secretName: "argocd-agent-resource-proxy-tls"
    # -- Path to the resource proxy TLS cert
    tlsCertPath: ""
    # -- Path to the resource proxy TLS key
    tlsKeyPath: ""
    # -- Name of the secret containing the resource proxy CA cert
    caSecretName: "argocd-agent-ca"
    # -- Path to the resource proxy CA cert
    caPath: ""

  redis:
    # -- Redis server address
    serverAddress: "argocd-redis:6379"
    # -- Compression type for Redis connection
    compressionType: "gzip"
    tls:
      # -- Enable TLS for Redis connections
      enabled: "false"
      # -- Skip verification of Redis TLS certificate (INSECURE - for development only)
      insecure: "false"
    proxyServerTls:
      # -- Path to TLS certificate for Redis proxy server
      certPath: "/app/config/redis-proxy-server-tls/tls.crt"
      # -- Path to TLS private key for Redis proxy server
      keyPath: "/app/config/redis-proxy-server-tls/tls.key"
      # -- Secret name containing TLS certificate and key for Redis proxy server
      secretName: "argocd-redis-proxy-tls"
    # -- Path to CA certificate for verifying Redis TLS certificate
    caPath: "/app/config/redis-tls/ca.crt"
    # -- Secret name containing CA certificate for verifying Redis TLS certificate
    caSecretName: "argocd-redis-tls"

  # -- Enable WebSocket for streaming events to agents
  websocketEnable: "false"

  # -- Drop agent connections that send keepalive pings more often than this interval
  keepAliveMinInterval: "0"

  # -- Port for pprof server (0 = disabled)
  pprofPort: "0"

  # -- Use destination-based mapping (route apps to agents via spec.destination.name)
  destinationBasedMapping: "false"

  # -- Kubernetes label selector to restrict which resources the principal watches.
  # Used in hybrid architectures where a traditional app-controller coexists with the principal.
  labelSelector: ""

  # -- Number of concurrent event processors
  eventProcessors: "10"

## @section Redis password secret reference
redis:
  # -- Name of the secret containing the Redis auth password
  existingSecret: "argocd-redis"
  # -- Key within the secret
  passwordKey: "auth"

## @section userpass secret
# DEPRECATED: The principal only reads this secret when params.auth starts with "userpass:".
# Leave create=false when using mTLS / header auth to avoid provisioning an
# empty, unused credential secret.
userpass:
  # -- Create the userpass secret. Only needed when params.auth uses "userpass:".
  create: false
  # -- Name of the secret (defaults to argocd-agent-principal-userpass)
  secretName: ""
  # -- The passwd file contents (bcrypt-hashed credentials)
  passwd: ""

## @section TLS secret (principal server cert/key)
tlsSecret:
  # -- Create the TLS secret (leave false if you manage it externally)
  create: false
  # -- Name of the secret (defaults to argocd-agent-principal-tls)
  secretName: ""
  # -- TLS certificate (PEM)
  crt: ""
  # -- TLS private key (PEM)
  key: ""

## @section Services
# -- Service configuration for metrics and healthz endpoints.
service:
  grpc:
    # -- Service type for the gRPC/principal service
    type: LoadBalancer
    # -- Override service name (defaults to chart fullname)
    name: ""
    # -- Port exposed by the service
    port: 443
    # -- Annotations for the gRPC service
    annotations: {}
    # -- LoadBalancer IP (if type=LoadBalancer)
    loadBalancerIP: ""

  metrics:
    # -- Whether to create the metrics service
    enabled: true
    port: 8000
    annotations: {}

  healthz:
    # -- Whether to create the healthz service
    enabled: true
    port: 8003
    annotations: {}

  redisProxy:
    # -- Whether to create the redis-proxy service
    enabled: true
    # -- Override service name. Defaults to "<fullname>-redis-proxy".
    # Set to "argocd-agent-redis-proxy" if consumers (e.g. argocd-server,
    # argocd-application-controller) are configured to use the legacy name.
    name: ""
    port: 6379
    annotations: {}

  resourceProxy:
    # -- Whether to create the resource-proxy service
    enabled: true
    # -- Override service name. Defaults to "<fullname>-resource-proxy".
    name: ""
    port: 9090
    annotations: {}

## @section Ingress (optional, alternative to LoadBalancer for gRPC)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: argocd-agent-principal.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

## @section ServiceMonitor
# -- Prometheus ServiceMonitor configuration.
serviceMonitor:
  # -- Whether to create a ServiceMonitor resource.
  enabled: false
  # -- Prometheus ServiceMonitor labels
  additionalLabels: {}
  # -- Prometheus ServiceMonitor annotations
  annotations: {}
  # -- Namespace where the ServiceMonitor should be created. Defaults to release namespace.
  namespace: ""
  # -- Prometheus scrape interval. Must be a valid duration string (e.g. "30s").
  interval: "30s"
  # -- Prometheus scrape timeout. Must be a valid duration string (e.g. "10s").
  scrapeTimeout: "10s"
  # -- Prometheus [RelabelConfigs] to apply to samples before scraping
  relabelings: []
  # -- Prometheus [MetricRelabelConfigs] to apply to samples before ingestion
  metricRelabelings: []
  # -- When true, honorLabels preserves the metric’s labels when they collide with the target’s labels.
  honorLabels: false
  # -- Prometheus ServiceMonitor scheme
  scheme: ""
  # -- Prometheus ServiceMonitor tlsConfig
  tlsConfig: {}

## @section NetworkPolicy
networkPolicy:
  # -- Whether to create a NetworkPolicy for the principal
  enabled: false
  # -- Namespace label value for monitoring namespace (used for metrics/healthz ingress)
  monitoringNamespace: "monitoring"

  # -- Ingress rule for the gRPC principal port (8443).
  # `from` is a list of NetworkPolicyPeer entries. Leave empty to allow from
  # anywhere — which is the right default when agents live outside this cluster
  # and reach principal via LoadBalancer / Ingress / Gateway. For in-cluster
  # agents or ingress-terminated setups, restrict to specific peers.
  grpcIngress:
    from: []
    # Example — only allow ingress-nginx and Istio gateway pods:
    # from:
    #   - podSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: ingress-nginx
    #   - namespaceSelector:
    #       matchLabels:
    #         kubernetes.io/metadata.name: istio-system
    #     podSelector:
    #       matchLabels:
    #         istio: ingressgateway

  # -- Ingress rule for the Redis proxy port (6379).
  # Defaults to allowing any pod labeled app.kubernetes.io/part-of=argocd
  # within the cluster.
  redisProxyIngress:
    from:
      - podSelector:
          matchLabels:
            app.kubernetes.io/part-of: argocd

  # -- Ingress rule for the Resource proxy port (9090).
  # Applied only when service.resourceProxy.enabled is true. Empty = allow any source.
  resourceProxyIngress:
    from: []

  # -- Additional ingress rules appended to the generated NetworkPolicy.
  # Each entry must be a valid NetworkPolicyIngressRule.
  extraIngress: []

  # -- Egress rules. When non-empty, "Egress" is added to policyTypes.
  egress: []

  # -- Fully replace the generated ingress rules with a custom list.
  # Useful when the built-in grpcIngress/redisProxyIngress/monitoring pattern
  # does not fit. When set, all other ingress knobs above are ignored.
  customIngressRules: []

  # -- Additional standalone NetworkPolicy resources. The map key becomes the
  # name suffix (<fullname>-<key>); the value is the spec.
  # Useful for layering per-tenant/per-source rules without forking the chart.
  extraPolicies: {}
  # Example — allow egress to argocd components and kube-dns:
  #   egress-argocd:
  #     podSelector:
  #       matchLabels:
  #         app.kubernetes.io/component: principal
  #     policyTypes: [Egress]
  #     egress:
  #       - to:
  #           - podSelector:
  #               matchLabels:
  #                 app.kubernetes.io/part-of: argocd
  #       - to:
  #           - namespaceSelector:
  #               matchLabels:
  #                 kubernetes.io/metadata.name: kube-system
  #             podSelector:
  #               matchLabels:
  #                 k8s-app: kube-dns
  #         ports:
  #           - protocol: UDP
  #             port: 53

## @section  Pod Disruption Budget
# NOTE: A PDB is only useful when replicaCount > 1. With the default
# replicaCount: 1 and minAvailable: 1, voluntary evictions (node drain,
# cluster upgrades) are blocked indefinitely since there is no second
# replica to take over. Scale replicaCount > 1 before enabling.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
