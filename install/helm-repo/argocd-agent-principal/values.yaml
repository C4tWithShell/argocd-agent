# Default values for argocd-agent-principal
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## @section Global
# -- Override namespace to deploy the agent into. Leave empty to use the release namespace.
namespaceOverride: ""
# -- Override the chart name
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

## @section Image
image:
  # -- Image repository
  repository: ghcr.io/argoproj-labs/argocd-agent/argocd-agent
  # -- Image pull policy
  pullPolicy: Always
  # -- Image tag
  tag: "latest"

## @section Deployment
# -- Number of replicas for the principal deployment
replicaCount: 1
# -- Image pull secrets
imagePullSecrets: []
# -- Annotations for the Deployment
deploymentAnnotations: {}
# -- Automount API credentials for the Service Account into the pod.
automountServiceAccountToken: true
# -- Resource requests and limits for the principal container
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

## @section ServiceAccount
# -- ServiceAccount configuration.
serviceAccount:
  # -- Whether to create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Name of the ServiceAccount (defaults to chart fullname)
  name: ""
  # -- Automount API credentials for the Service Account
  automountServiceAccountToken: true

## @section Pod security context
podSecurityContext:
  fsGroup: 999
  fsGroupChangePolicy: "OnRootMismatch"
  runAsGroup: 999
  runAsNonRoot: true
  runAsUser: 999
  seccompProfile:
    type: RuntimeDefault

## @section Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 999
  runAsNonRoot: true
  runAsUser: 999
  seccompProfile:
    type: RuntimeDefault

## @section Pod Scheduling and Metadata
# -- Node selector for scheduling the agent Pod.
nodeSelector: {}
# -- Tolerations for pod scheduling
tolerations: []
# -- Affinity rules for pod scheduling
affinity: {}
# -- Annotations for the Pod
podAnnotations: {}
# -- Additional labels to add to the agent Pod.
podLabels: {}
# -- PriorityClassName for the agent Pod.
priorityClassName: ""
## -- Extra environment variables to add to the container
extraEnv: []
## -- Extra volume mounts
extraVolumeMounts: []
## -- Extra volumes
extraVolumes: []

## @section Probes
# -- Liveness and readiness probe configuration.
probes:
  liveness:
    # -- Enable the liveness probe.
    enabled: true
    httpGet:
      path: /healthz
      port: healthz
    # -- Initial delay before the first liveness probe.
    initialDelaySeconds: 10
    # -- Frequency of liveness probes.
    periodSeconds: 10
    # -- Timeout for liveness probe.
    timeoutSeconds: 2
    # -- Failure threshold for liveness probe.
    failureThreshold: 3
  readiness:
    # -- Enable the readiness probe.
    enabled: true
    httpGet:
      path: /healthz
      port: healthz
    # -- Initial delay before the first readiness probe.
    initialDelaySeconds: 5
    # -- Frequency of readiness probes.
    periodSeconds: 10
    # -- Timeout for readiness probe.
    timeoutSeconds: 2
    # -- Failure threshold for readiness probe.
    failureThreshold: 3

## @section RBAC
rbac:
  # -- To create Role and RoleBinding
  create: true
  # -- Whether to create ClusterRole and ClusterRoleBinding
  createClusterRole: false

## @section Principal Parameters
params:
  # -- Interface address to listen on. Empty = all interfaces.
  listenHost: ""
  # -- gRPC server listen port
  listenPort: "8443"
  # -- Log level: trace, debug, info, warn, error
  logLevel: "info"
  # -- Log format: text or json
  logFormat: "text"
  # -- Metrics server port
  metricsPort: "8000"
  # -- Health check server port
  healthzPort: "8003"
  # -- Namespace the principal operates in
  namespace: "argocd"
  # -- Comma-separated list of namespaces to watch (supports shell-style wildcards)
  allowedNamespaces: ""

  namespaceCreate:
    # -- Allow the principal to create namespaces for agents
    enable: "false"
    # -- Regexp to restrict names of created namespaces
    pattern: ""
    # -- Labels to apply to created namespaces (comma-separated key=value pairs)
    labels: ""

  tls:
    # -- Name of the secret containing the TLS cert and key
    secretName: "argocd-agent-principal-tls"
    # -- Path to the TLS certificate (overrides secretName if set)
    serverCertPath: ""
    # -- Path to the TLS private key (overrides secretName if set)
    serverKeyPath: ""
    # -- Allow the principal to auto-generate TLS cert/key (dev only)
    allowGenerate: "false"
    # -- Run gRPC without TLS (for service mesh / mTLS sidecar environments)
    insecurePlaintext: "false"
    # -- Require client certificates from agents
    clientCertRequire: "false"
    # -- Name of the secret containing the root CA certificate
    rootCaSecretName: "argocd-agent-ca"
    # -- Path to the root CA certificate (overrides rootCaSecretName if set)
    rootCaPath: ""
    # -- Match client cert subject to agent name
    clientCertMatchSubject: "false"
    # -- Minimum TLS version: tls1.1, tls1.2, tls1.3
    minVersion: "tls1.3"
    # -- Maximum TLS version (empty = use highest available)
    maxVersion: ""
    # -- Comma-separated list of TLS cipher suites (empty = Go defaults)
    ciphersuites: ""

  jwt:
    # -- Allow the principal to auto-generate JWT signing key (dev only)
    allowGenerate: "false"
    # -- Name of the secret containing the JWT signing key
    secretName: "argocd-agent-jwt"
    # -- Path to the JWT signing key (overrides secretName if set)
    keyPath: ""

  # -- Authentication method. Format: <method>:<config>
  # Examples:
  #   "mtls:CN=([^,]+)"
  #   "userpass:/app/config/userpass/passwd"
  #   "header:x-forwarded-client-cert:^.*URI=spiffe://[^/]+/ns/[^/]+/sa/([^,;]+)"
  auth: "mtls:CN=([^,]+)"

  resourceProxy:
    # -- Enable the resource proxy
    enable: "true"
    # -- Name of the secret containing the resource proxy TLS cert/key
    secretName: "argocd-agent-resource-proxy-tls"
    # -- Path to the resource proxy TLS cert
    tlsCertPath: ""
    # -- Path to the resource proxy TLS key
    tlsKeyPath: ""
    # -- Name of the secret containing the resource proxy CA cert
    caSecretName: "argocd-agent-ca"
    # -- Path to the resource proxy CA cert
    caPath: ""

  redis:
    # -- Redis server address
    serverAddress: "argocd-redis:6379"
    # -- Compression type for Redis connection
    compressionType: "gzip"
    tls:
      # -- Enable TLS for Redis connections
      enabled: "false"
      # -- Skip verification of Redis TLS certificate (INSECURE - for development only)
      insecure: "false"
    proxyServerTls:
      # -- Path to TLS certificate for Redis proxy server
      certPath: "/app/config/redis-proxy-server-tls/tls.crt"
      # -- Path to TLS private key for Redis proxy server
      keyPath: "/app/config/redis-proxy-server-tls/tls.key"
      # -- Secret name containing TLS certificate and key for Redis proxy server
      secretName: "argocd-redis-proxy-tls"
    # -- Path to CA certificate for verifying Redis TLS certificate
    caPath: "/app/config/redis-tls/ca.crt"
    # -- Secret name containing CA certificate for verifying Redis TLS certificate
    caSecretName: "argocd-redis-tls"

  # -- Enable WebSocket for streaming events to agents
  websocketEnable: "false"

  # -- Drop agent connections that send keepalive pings more often than this interval
  keepAliveMinInterval: "0"

  # -- Port for pprof server (0 = disabled)
  pprofPort: "0"

  # -- Use destination-based mapping (route apps to agents via spec.destination.name)
  destinationBasedMapping: "false"

  # -- Kubernetes label selector to restrict which resources the principal watches.
  # Used in hybrid architectures where a traditional app-controller coexists with the principal.
  labelSelector: ""

  # -- Number of concurrent event processors
  eventProcessors: "10"

## @section Redis password secret reference
redis:
  # -- Name of the secret containing the Redis auth password
  existingSecret: "argocd-redis"
  # -- Key within the secret
  passwordKey: "auth"

## @section userpass secret
userpass:
  # -- Create the userpass secret
  create: true
  # -- Name of the secret (defaults to argocd-agent-principal-userpass)
  secretName: ""
  # -- The passwd file contents (bcrypt-hashed credentials)
  passwd: ""

## @section TLS secret (principal server cert/key)
tlsSecret:
  # -- Create the TLS secret (leave false if you manage it externally)
  create: false
  # -- Name of the secret (defaults to argocd-agent-principal-tls)
  secretName: ""
  # -- TLS certificate (PEM)
  crt: ""
  # -- TLS private key (PEM)
  key: ""

## @section Services
# -- Service configuration for metrics and healthz endpoints.
service:
  grpc:
    # -- Service type for the gRPC/principal service
    type: LoadBalancer
    # -- Port exposed by the service
    port: 443
    # -- Annotations for the gRPC service
    annotations: {}
    # -- LoadBalancer IP (if type=LoadBalancer)
    loadBalancerIP: ""

  metrics:
    # -- Whether to create the metrics service
    enabled: true
    port: 8000
    annotations: {}

  healthz:
    # -- Whether to create the healthz service
    enabled: true
    port: 8003
    annotations: {}

  redisProxy:
    # -- Whether to create the redis-proxy service
    enabled: true
    port: 6379
    annotations: {}

  resourceProxy:
    # -- Whether to create the resource-proxy service
    enabled: true
    port: 9090
    annotations: {}

## @section Ingress (optional, alternative to LoadBalancer for gRPC)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: argocd-agent-principal.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

## @section ServiceMonitor
# -- Prometheus ServiceMonitor configuration.
serviceMonitor:
  # -- Whether to create a ServiceMonitor resource.
  enabled: false
  # -- Prometheus ServiceMonitor labels
  additionalLabels: {}
  # -- Prometheus ServiceMonitor annotations
  annotations: {}
  # -- Namespace where the ServiceMonitor should be created. Defaults to release namespace.
  namespace: ""
  # -- Prometheus scrape interval. Must be a valid duration string (e.g. "30s").
  interval: "30s"
  # -- Prometheus scrape timeout. Must be a valid duration string (e.g. "10s").
  scrapeTimeout: "10s"
  # -- Prometheus [RelabelConfigs] to apply to samples before scraping
  relabelings: []
  # -- Prometheus [MetricRelabelConfigs] to apply to samples before ingestion
  metricRelabelings: []
  # -- When true, honorLabels preserves the metric’s labels when they collide with the target’s labels.
  honorLabels: false
  # -- Prometheus ServiceMonitor scheme
  scheme: ""
  # -- Prometheus ServiceMonitor tlsConfig
  tlsConfig: {}

## @section NetworkPolicy
networkPolicy:
  # -- Whether to create a NetworkPolicy for the principal
  enabled: false
  # -- Namespace label value for monitoring namespace (used for metrics/healthz ingress)
  monitoringNamespace: "monitoring"

## @section  Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1
