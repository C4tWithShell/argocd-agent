{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "argocd-agent-agent.agentDeploymentName" . }}
  namespace: {{ include "argocd-agent-agent.namespace" . }}
  labels:
    {{- include "argocd-agent-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "argocd-agent-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  {{- if .Values.networkPolicy.egress }}
  - Egress
  {{- end }}
  ingress:
  {{- if .Values.networkPolicy.customIngressRules }}
  {{- toYaml .Values.networkPolicy.customIngressRules | nindent 2 }}
  {{- else }}
  # Metrics / healthz from the monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
    ports:
    - protocol: TCP
      port: {{ .Values.service.metrics.port }}
  {{- end }}
  # extraIngress always appends, whether or not customIngressRules is set,
  # so users combining a custom override with additional rules aren't surprised.
  {{- with .Values.networkPolicy.extraIngress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{/*
Extra standalone NetworkPolicy resources defined by the user via
networkPolicy.extraPolicies. The map key becomes the name suffix.
*/}}
{{- range $name, $spec := .Values.networkPolicy.extraPolicies }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-%s" (include "argocd-agent-agent.agentDeploymentName" $) $name }}
  namespace: {{ include "argocd-agent-agent.namespace" $ }}
  labels:
    {{- include "argocd-agent-agent.labels" $ | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  {{- toYaml $spec | nindent 2 }}
{{- end }}
